apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: ${{ values.destination.owner + "/" + values.destination.repo }}
    tektonci/build-namespace: ${{ values.namespace }}
    janus-idp.io/tekton: ${{ values.name }}-ci-cd
  links:
      - title: Open in Dev Spaces (VS Code)
        # Constructing the Factory URL
        # Assuming your devspaces host is something like devspaces.apps.cluster...
        url: https://devspaces.${{ values.clusterDomain }}/#${{ steps['publishSource'].output.remoteUrl | replace(".git", "") }}
        icon: web
spec:
  type: service
  lifecycle: dev
  owner: ${{ values.owner | dump }}